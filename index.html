<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Photo Gallery</title>
    
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .info { margin-bottom: 10px; color: #888; font-size: 14px; }
        #img-container { width: 100%; max-width: 600px; position: relative; display: flex; justify-content: center; }
        img { width: 100%; height: auto; display: block; border: 1px solid #333; }
        
        .nav-bar { margin-top: 20px; display: flex; gap: 20px; }
        button { padding: 15px 30px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:active { background: #444; }
    </style>
</head>
<body>

    <div class="info">Image <span id="current-num">1</span> of <span id="total-num">3</span></div>

    <div id="img-container">
        <img id="display-photo" src="photo1.jpg" alt="Loading...">
    </div>

    <div class="nav-bar">
        <button onclick="move(-1)">Previous</button>
        <button onclick="move(1)">Next</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        // LIST YOUR PHOTO FILENAMES EXACTLY AS THEY APPEAR IN GITHUB
        const myPhotos = ["photo1.jpg", "photo2.jpg", "photo3.jpg"]; 

        // --- POPUP LOGIC ---
        // This shows the popup before the user can see the first photo
        window.onload = function() {
            alert("Welcome! You are about to view the photo gallery. Use the buttons below to navigate.");
        };

        // --- GALLERY LOGIC ---
        let currentIndex = 0;
        const mainImg = document.getElementById("display-photo");
        const currentText = document.getElementById("current-num");
        document.getElementById("total-num").innerText = myPhotos.length;

        function move(step) {
            currentIndex += step;
            
            // Loop logic (goes from last back to first)
            if (currentIndex >= myPhotos.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = myPhotos.length - 1;

            // Change image
            mainImg.src = myPhotos[currentIndex];
            currentText.innerText = currentIndex + 1;

            // Tracking for Clarity
            if (window.clarity) {
                window.clarity("event", "nav_click", { "to_photo": myPhotos[currentIndex] });
            }
        }

        // --- SPEED OPTIMIZATION (PRE-LOADING) ---
        // This tells the browser to download the other images in the background
        myPhotos.forEach(p => {
            const tempImg = new Image();
            tempImg.src = p;
        });
    </script>
</body>
</html>
