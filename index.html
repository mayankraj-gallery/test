<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>

    <style>
        /* Fast Loading CSS */
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        
        .counter { margin-top: 15px; font-size: 14px; color: #888; }
        
        #img-box { width: 100%; height: 70vh; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; max-height: 100%; display: block; }

        /* Buttons moved UP for mobile ease of use */
        .controls { margin-top: 20px; padding-bottom: 60px; display: flex; justify-content: center; gap: 20px; }
        button { padding: 15px 30px; background: #333; color: white; border: 1px solid #555; border-radius: 8px; font-size: 16px; font-weight: bold; }
        button:active { background: #555; }
    </style>
</head>
<body>

    <div class="counter"><span id="idx">1</span> / 2</div>

    <div id="img-box">
        <img id="main-photo" src="photo1.jpg">
    </div>

    <div class="controls">
        <button onclick="change(-1)">PREV</button>
        <button onclick="change(1)">NEXT</button>
    </div>

    <script>
        // Use your 2 photo names here
        const photos = ["photo1.jpg", "photo2.jpg"];
        let current = 0;

        // THE POPUP (Exactly as you liked the first time)
        // Wrapped in timeout to ensure it triggers on all mobile browsers
        setTimeout(function() {
            alert("• Tap to zoom in/out\n• Click prev/next for more photos\n• Pinch to zoom for details");
        }, 500);

        function change(step) {
            current += step;
            
            // Loop logic for 2 photos
            if (current >= photos.length) current = 0;
            if (current < 0) current = photos.length - 1;

            // Update Image and Counter
            document.getElementById("main-photo").src = photos[current];
            document.getElementById("idx").innerText = current + 1;

            // Send event to Clarity
            if (window.clarity) {
                window.clarity("event", "switched_photo", { "name": photos[current] });
            }
        }
    </script>
</body>
</html>
