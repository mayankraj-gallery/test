<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Photo Gallery</title>
    
    <style>
        body { margin: 0; background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Speed: Container for fast rendering */
        #gallery { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        img { max-width: 100%; max-height: 100%; display: block; object-fit: contain; }

        /* The Custom Popup (3 lines as requested) */
        #popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; display: flex; align-items: center; justify-content: center; text-align: center; }
        .popup-content { background: #222; padding: 30px; border-radius: 15px; border: 1px solid #444; width: 80%; }
        .popup-content h2 { margin-top: 0; color: #fff; }
        .popup-content p { color: #ccc; line-height: 1.6; margin: 5px 0; }
        .popup-btn { margin-top: 20px; padding: 12px 30px; background: #007bff; border: none; color: white; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Navigation Buttons - Mobile Optimized */
        .controls { height: 80px; display: flex; justify-content: space-around; align-items: center; background: #111; border-top: 1px solid #333; }
        .nav-btn { background: #333; color: white; border: none; padding: 15px 35px; border-radius: 8px; font-size: 16px; font-weight: bold; -webkit-tap-highlight-color: transparent; }
        .nav-btn:active { background: #555; }
    </style>
</head>
<body>

    <div id="popup">
        <div class="popup-content">
            <h2>Instructions</h2>
            <p>• Use fingers to <b>Pinch to Zoom</b> in/out.</p>
            <p>• <b>Tap or Double Tap</b> to see details.</p>
            <p>• Use <b>Next/Prev</b> buttons to switch.</p>
            <button class="popup-btn" onclick="closePopup()">Start Viewing</button>
        </div>
    </div>

    <div id="gallery">
        <img id="main-img" src="photo1.jpg" alt="Photo">
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="change( -1 )">PREVIOUS</button>
        <button class="nav-btn" onclick="change( 1 )">NEXT</button>
    </div>

    <script>
        // UPDATED: Only 2 photos as per your request
        const images = ["photo1.jpg", "photo2.jpg"]; 
        let currentIdx = 0;

        const mainImg = document.getElementById('main-img');

        // Close Popup function
        function closePopup() {
            document.getElementById('popup').style.display = 'none';
        }

        // Mobile-Fix: Explicitly handling index for 2 photos
        function change(step) {
            currentIdx += step;
            if (currentIdx < 0) currentIdx = images.length - 1;
            if (currentIdx >= images.length) currentIdx = 0;

            mainImg.src = images[currentIdx];

            // Clarity Event Tracking
            if(window.clarity) {
                window.clarity("event", "switched_photo", { "photo": images[currentIdx] });
            }
        }

        // SPEED OPTIMIZATION: Pre-load the 2nd photo immediately
        window.addEventListener('load', () => {
            images.forEach(src => {
                const pre = new Image();
                pre.src = src;
            });
        });
    </script>
</body>
</html>
