<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Photo Journey Tracker</title>
    
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow-x: hidden; }
        .gallery-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100vw; }
        
        /* The container helps Clarity track the zoom area */
        #viewport { width: 100%; max-width: 500px; overflow: hidden; position: relative; }
        img { width: 100%; height: auto; display: block; transition: transform 0.1s ease; }
        
        .controls { position: fixed; bottom: 30px; display: flex; gap: 15px; z-index: 100; }
        button { padding: 15px 25px; background: rgba(255,255,255,0.2); color: white; border: 1px solid #fff; border-radius: 50px; cursor: pointer; backdrop-filter: blur(5px); }
        .info { position: fixed; top: 20px; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>

    <div class="gallery-wrapper">
        <div class="info">Photo <span id="idx">1</span> of <span id="total">3</span></div>
        
        <div id="viewport">
            <img id="main-photo" src="photo1.jpg" alt="Gallery">
        </div>

        <div class="controls">
            <button onclick="nav(-1)">Prev</button>
            <button onclick="nav(1)">Next</button>
        </div>
    </div>

    <script>
        // LIST YOUR PHOTO FILENAMES EXACTLY AS THEY ARE IN GITHUB
        const album = ["photo1.jpg", "photo2.jpg"];
        
        let current = 0;
        const img = document.getElementById("main-photo");
        const idxText = document.getElementById("idx");
        document.getElementById("total").innerText = album.length;

        function nav(step) {
            current += step;
            if (current >= album.length) current = 0;
            if (current < 0) current = album.length - 1;
            
            img.src = album[current];
            idxText.innerText = current + 1;

            // This tells Clarity to mark a 'navigation' event in your video timeline
            if (window.clarity) {
                window.clarity("event", "photo_swiped", { "id": album[current] });
            }
        }

        // Help Clarity track "Zoom" touches
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1 && window.clarity) {
                window.clarity("event", "pinch_detected");
            }
        }, {passive: true});
    </script>
</body>
</html>
